# Flow Matching training config aligned with Kimodo-G1-SEED-v1 (denoiser block).
generative_paradigm: flow_matching
num_base_steps: 1000
cfg_type: separated

flow_matching:
  matcher: ot_cfm
  sigma: 0.0
  ode_solver: euler
  default_ode_steps: 20

training:
  fps: 30
  source_fps: 120.0
  max_frames: 300
  batch_size: 4
  num_workers: 2
  lr: 1.0e-4
  weight_decay: 0.0
  warmup_steps: 1000
  # Official Kimodo DDPM training: 500k (text-only) + 500k (text+constraints) = 1M steps.
  # FM trainer uses a single-phase loop today; total step budget matches official.
  phase_1_steps: 500000
  phase_2_steps: 500000
  max_steps: 1000000
  grad_clip: 1.0
  log_every: 50
  save_every: 25000
  # Optional: if set, overrides save_every (in optimizer steps).
  # Example: save_every_epochs: 20  -> every ~20 full passes over the train split.
  save_every_epochs: null
  constraint_prob: 0.8
  max_keyframes: 4
  cfg_dropout:
    uncond: 0.1
    text_only: 0.1
    constraint_only: 0.1

denoiser:
  _target_: kimodo.model.twostage_denoiser.TwostageDenoiser
  motion_mask_mode: concat
  motion_rep:
    _target_: kimodo.motion_rep.KimodoMotionRep
    fps: 30
    stats_path: null
    skeleton:
      _target_: kimodo.skeleton.G1Skeleton34
  llm_shape: [1, 4096]
  use_text_mask: false
  latent_dim: 1024
  ff_size: 2048
  num_layers: 16
  num_heads: 8
  activation: gelu
  dropout: 0.0
  pe_dropout: 0.0
  norm_first: false
  num_text_tokens_override: 50
  input_first_heading_angle: true

text_encoder:
  _target_: kimodo.model.LLM2VecEncoder
  base_model_name_or_path: McGill-NLP/LLM2Vec-Meta-Llama-3-8B-Instruct-mntp
  peft_model_name_or_path: McGill-NLP/LLM2Vec-Meta-Llama-3-8B-Instruct-mntp-supervised
  dtype: float32
  llm_dim: 4096
  device: auto
