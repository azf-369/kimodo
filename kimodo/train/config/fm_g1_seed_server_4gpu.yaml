# 4x H100 80GB DDP overrides (use with torchrun --nproc_per_node=4).
# Per-GPU batch 96; global batch = 96 x 4 = 384.
# GPU VRAM ~63GB/80GB; CPU-bound preprocessing — maximize workers + prefetch.
training:
  batch_size: 96
  gradient_accumulation_steps: 1
  num_workers: 5
  # FM base: lr=1e-4 @ global batch 4; sqrt scale to global 384 -> ~9.8e-4.
  lr: 1.0e-3
  lr_scaling: sqrt
  lr_reference_batch: 4
  warmup_steps: 10000
  max_steps: 1000000
  # ~334 steps/epoch @ global batch 384 on SEED train split.
  save_every_epochs: 2

dataloader:
  pin_memory: true
  persistent_workers: true
  prefetch_factor: 8

resource_guard:
  enabled: true
  mem_caution_watermark: 0.78
  mem_high_watermark: 0.85
  mem_critical_watermark: 0.92
  check_every_steps: 50
  min_num_workers: 2
  min_prefetch_factor: 2
  reserve_gb: 10
  gb_per_worker: 2.5
  mem_prefetch_cap_ratio: 0.70
