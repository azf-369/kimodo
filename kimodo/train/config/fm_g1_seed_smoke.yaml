# Smoke-test overrides: same pipeline, smaller model for fast CPU/GPU validation.
training:
  max_frames: 60
  batch_size: 2
  num_workers: 0
  max_steps: 8
  warmup_steps: 0
  log_every: 1
  save_every: 1000000
  constraint_prob: 0.5

denoiser:
  latent_dim: 256
  ff_size: 512
  num_layers: 2
  num_heads: 4
