# Stage-2 Progressive Distillation (50→25) — local 16GB.
#
# Continues from Stage-1 student (50-step) checkpoint:
#   outputs/pd_g1_rp_teacher_seed/stage_100to50_best/step_30000
#
# Loss / data / CFG recipe matches Stage-1 archive
#   pd_g1_stage1_100to50_local.yaml
# only teacher/student DDIM steps change (50→25).
#
# Train:
#   STAGE1=outputs/pd_g1_rp_teacher_seed/stage_100to50_best/step_30000
#   python -m kimodo.distill.scripts.train_pd \
#     --local --recipe pd_g1_stage2_50to25_local --stage 50to25 \
#     --teacher-checkpoint "$STAGE1" --teacher-dtype fp32 \
#     --data-root datasets/bones-seed \
#     --split-path datasets/kimodo-benchmark/splits/train_split_paths.txt \
#     --stats-path checkpoints/Kimodo-G1-SEED-v1.hf/stats/motion \
#     --output-dir outputs/pd_g1_rp_teacher_seed/stage_50to25 \
#     --device cuda --wandb --wandb-project kimodo-pd-g1 \
#     --wandb-run-name pd-50to25-from-best
#
# Teacher = frozen Stage-1 student; student init = copy of teacher
# (init_student_from_teacher: true). Do NOT pass official RP as teacher.

training:
  max_frames: 300
  frame_crop: random
  batch_size: 1
  gradient_accumulation_steps: 8
  num_workers: 2
  lr: 5.0e-6
  lr_schedule: cosine
  min_lr_ratio: 0.1
  warmup_steps: 2000
  weight_decay: 0.0
  max_steps: 30000
  grad_clip: 1.0
  log_every: 20
  save_every: 1000
  constraint_prob: 1.0
  max_keyframes: 6
  # FullBody-only → same Stage-1 formal_cons sampling path as stage_100to50_best
  constraint_mix:
    fullbody: 1.0
  cfg_dropout:
    uncond: 0.05
    text_only: 0.05
    constraint_only: 0.25

distill:
  teacher_steps: 50
  student_steps: 25
  init_student_from_teacher: true
  amp: true
  amp_dtype: bfloat16
  pd_match_space: x0
  snr_gamma: 5.0
  pd_jump_weight: 1.0
  diffuse_anchor_weight: 0.5
  teacher_x0_weight: 0.2
  constraint_anchor_weight: 2.0
  root_xz_weight: 0.0
  ee_pos_weight: 0.0
  contact_weight: 0.0
  skate_weight: 0.0
  save_step0: true

text_cache:
  enabled: true
  dir: datasets/bones-seed/cache/llm2vec_g1_train
  auto_precompute: false

_stage_meta:
  stage: 50to25
  parent_recipe: pd_g1_stage1_100to50_local
  parent_checkpoint: outputs/pd_g1_rp_teacher_seed/stage_100to50_best/step_30000
