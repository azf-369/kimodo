# Stage-4 Progressive Distillation (12→6) — constraint-first (cons) recipe.
#
# Active Stage-4 recipe (same hypers as the run that peaked @ step_4000:
#   root≈0.106, EE≈0.188, fullbody≈0.050 @ 6 steps).
# Prior run kept at: outputs/.../stage_12to6_cons/  (do not overwrite).
# Rerun default out: stage_12to6_cons_rerun
#
# Backup recipes (do not delete):
#   pd_g1_stage4_12to6_gentle_local.yaml → stage_12to6_gentle
#   pd_g1_stage4_12to6_cons_v2_local.yaml → stage_12to6_cons_v2
#
# This recipe:
#   1) constraint_mix: dense Root2D + EE hands/feet (+ some FullBody)
#   2) stronger constraint_anchor + root_xz / ee_pos channel losses
#   3) higher constraint_only CFG; slightly higher lr / longer budget
#   4) keep solid teacher_x0 so 6-NFE PD jump does not collapse motion
#
# Teacher:
#   outputs/pd_g1_rp_teacher_seed/stage_24to12_best/step_8000
#
# Train (cold start; new output dir to keep prior cons/step_4000):
#   bash scripts/run_pd_stage4_12to6_cons_local.sh
#   # or:
#   STAGE3=outputs/pd_g1_rp_teacher_seed/stage_24to12_best/step_8000
#   python -m kimodo.distill.scripts.train_pd \
#     --local --recipe pd_g1_stage4_12to6_cons_local --stage 12to6 \
#     --teacher-checkpoint "$STAGE3" --teacher-dtype fp32 \
#     --data-root datasets/bones-seed \
#     --split-path datasets/kimodo-benchmark/splits/train_split_paths.txt \
#     --stats-path checkpoints/Kimodo-G1-SEED-v1.hf/stats/motion \
#     --output-dir outputs/pd_g1_rp_teacher_seed/stage_12to6_cons_rerun \
#     --device cuda --wandb --wandb-project kimodo-pd-g1 \
#     --wandb-run-name pd-12to6-cons-rerun
#
# Eval @6 every 1k; peak historically ~4k. Compare vs stage_12to6_cons/step_4000.

training:
  max_frames: 300
  frame_crop: random
  batch_size: 1
  gradient_accumulation_steps: 8
  num_workers: 2
  lr: 1.5e-6
  lr_schedule: cosine
  min_lr_ratio: 0.2
  warmup_steps: 400
  weight_decay: 0.0
  max_steps: 12000
  grad_clip: 1.0
  log_every: 20
  save_every: 1000
  constraint_prob: 1.0
  max_keyframes: 8
  # Match demo / eval constraint types (not FullBody-only).
  constraint_mix:
    fullbody: 0.20
    root2d: 0.30
    ee_hands: 0.30
    ee_feet: 0.20
  cfg_dropout:
    uncond: 0.05
    text_only: 0.05
    constraint_only: 0.22

distill:
  teacher_steps: 12
  student_steps: 6
  init_student_from_teacher: true
  amp: true
  amp_dtype: bfloat16
  pd_match_space: x0
  snr_gamma: 5.0
  pd_jump_weight: 1.0
  diffuse_anchor_weight: 0.20
  teacher_x0_weight: 0.45
  constraint_anchor_weight: 2.5
  root_xz_weight: 1.5
  ee_pos_weight: 2.0
  contact_weight: 0.0
  skate_weight: 0.0
  save_step0: true

text_cache:
  enabled: true
  dir: datasets/bones-seed/cache/llm2vec_g1_train
  auto_precompute: false

_stage_meta:
  stage: 12to6
  parent_recipe: pd_g1_stage3_24to12_gentle_local
  parent_checkpoint: outputs/pd_g1_rp_teacher_seed/stage_24to12_best/step_8000
  prior_stage4_recipe: pd_g1_stage4_12to6_gentle_local
  historical_peak: outputs/pd_g1_rp_teacher_seed/stage_12to6_cons/step_4000
  note: active cons retrain; same hypers as historical peak @4k; write to cons_rerun
