# Progressive Distillation for Kimodo-G1: RP teacher, SEED data.
# Architecture matches official Kimodo-G1-*-v1 (text tokens=50, heading, constraints).
generative_paradigm: diffusion
num_base_steps: 1000
# Exported / inference default aligns with official G1 (separated CFG).
cfg_type: separated

distill:
  teacher_steps: 100
  student_steps: 50
  init_student_from_teacher: true
  amp: true
  amp_dtype: bfloat16
  # Defaults; formal_* configs override LR/loss recipe.
  pd_match_space: x0
  snr_gamma: 5.0
  pd_jump_weight: 1.0
  diffuse_anchor_weight: 0.5
  teacher_x0_weight: 0.2
  constraint_anchor_weight: 2.0
  save_step0: true

training:
  fps: 30
  source_fps: 120.0
  # Match official-ish clip length; window with frame_crop (default random).
  max_frames: 300
  frame_crop: random
  batch_size: 1
  gradient_accumulation_steps: 4
  num_workers: 2
  lr: 1.0e-5
  lr_schedule: cosine
  min_lr_ratio: 0.1
  weight_decay: 0.0
  warmup_steps: 1000
  max_steps: 10000
  grad_clip: 1.0
  log_every: 20
  save_every: 1000
  # Align with official training recipe (text + synthetic constraints + CFG dropout).
  constraint_prob: 0.8
  max_keyframes: 4
  cfg_dropout:
    uncond: 0.1
    text_only: 0.1
    constraint_only: 0.1

denoiser:
  _target_: kimodo.model.twostage_denoiser.TwostageDenoiser
  motion_mask_mode: concat
  motion_rep:
    _target_: kimodo.motion_rep.KimodoMotionRep
    fps: 30
    stats_path: null
    skeleton:
      _target_: kimodo.skeleton.G1Skeleton34
  llm_shape: [1, 4096]
  use_text_mask: false
  latent_dim: 1024
  ff_size: 2048
  num_layers: 16
  num_heads: 8
  activation: gelu
  dropout: 0.0
  pe_dropout: 0.0
  norm_first: false
  num_text_tokens_override: 50
  input_first_heading_angle: true

text_encoder:
  _target_: kimodo.model.LLM2VecEncoder
  base_model_name_or_path: McGill-NLP/LLM2Vec-Meta-Llama-3-8B-Instruct-mntp
  peft_model_name_or_path: McGill-NLP/LLM2Vec-Meta-Llama-3-8B-Instruct-mntp-supervised
  dtype: float32
  llm_dim: 4096
  device: auto

# Prefer precomputed embeddings so denoiser VRAM is not shared with Llama-3-8B.
text_cache:
  enabled: true
  dir: datasets/bones-seed/cache/llm2vec_g1_train
  auto_precompute: true
